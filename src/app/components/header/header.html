<header>

        <div class="container-fluid">
            <div class="mega-menu-wrapper">
                <div class="header-main">
                    <div class="header-left">
                        <div class="logo">
                            <a routerLink="/home" class="header-logo-2">
                                <img src="assets/img/logo/header-logo.png" alt="logo-img">
                            </a>
                        </div>
                        <div class="mean__menu-wrapper">
                            <div class="main-menu">
                                <nav id="mobile-menu">
                                    <ul>
                                        <li >
                                            <a routerLink="/home">
                                                Home
                                            </a>
                                        </li>

                                        <li>
                                            <a routerLink="/about">About</a>
                                        </li>
                                        <li>
                                            <a>
                                                Services
                                                <i class="fas fa-angle-down"></i>
                                            </a>
                                            <ul class="submenu">
                                                <li><a routerLink="/services2">Wallpaper installation or repair</a></li>
                                                <li><a routerLink="/services3">Wallpaper removal</a></li>
                                                <li><a routerLink="/services1">Interior Painting</a></li>

                                            </ul>
                                        </li>
                                        <li>
                                            <a routerLink="/gallery">
                                                Portfolio

                                            </a>

                                        </li>
                                        <li>
                                            <a routerLink="/faqs">FAQs</a>
                                        </li>
                                        <li>
                                            <a routerLink="/contact">Contact</a>
                                        </li>
                                        <li>
                                            <a routerLink="/homeDashboard">Admin</a>

                                        </li>
                                    </ul>
                                </nav>
                            </div>
                        </div>
                    </div>
                    <div class="header-right d-flex justify-content-end align-items-center">
                        <a class="search-trigger search-icon">
                            <button class="fab">
                                <i class="fal fa-envelope"></i>
                                <h4 class="phone-number">admin&#64;casainstall.com</h4>
                            </button>
                        </a>

                        <a class="search-trigger search-icon">
                            <button class="fab" (click)="toggleMenu($event)">
                                <i class="fal fa-phone-alt"></i>
                                <h4 class="phone-number">919 885-5401</h4>
                            </button>
                            <div class="fab-menu" [class.show]="menuOpen">
                                <button (click)="sendSMS()">Send SMS</button>
                                <button (click)="makeCall()">Make Call</button>
                            </div>
                        </a>
                        <div class="header__hamburger d-xl-block my-auto">
                            <div class="sidebar__toggle">
                                <img src="assets/img/bar.png" alt="img">
                            </div>
                        </div>
                    </div>

            </div>
